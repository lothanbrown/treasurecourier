<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treasure Courier Services Ltd – Shop Online. We Deliver.</title>
  <meta name="description" content="Treasure Courier Services Ltd – Fast, reliable air and sea shipping from Miami to Jamaica." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0d2460;
      --blue: #1565c0;
      --sky:  #e8f4fd;
      --gold: #f5a800;
      --white: #ffffff;
    }
    body { font-family: 'Barlow', sans-serif; background: var(--navy); }

    /* ── FLYER ─────────────────────────────────────── */
    .flyer {
      background: var(--navy);
      display: flex; justify-content: center;
      padding: 0;
    }
    .flyer img {
      display: block;
      width: 100%;
      max-width: 600px;
      height: auto;
    }

    /* ── CONTACT FORM ──────────────────────────────── */
    .contact {
      background: linear-gradient(175deg, #daeeff 0%, #f0f8ff 60%, #ffffff 100%);
      padding: 48px 24px 60px;
    }
    .form-wrap {
      max-width: 560px; margin: 0 auto;
      background: var(--white);
      border: 1.5px solid #ccddf5;
      border-top: 4px solid var(--gold);
      border-radius: 12px;
      padding: 36px 32px;
      box-shadow: 0 8px 32px rgba(21,101,192,0.08);
    }
    .form-heading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px; letter-spacing: 1px;
      color: var(--navy); margin-bottom: 24px;
    }
    .form-heading span { color: var(--gold); }

    .cform { display: flex; flex-direction: column; gap: 14px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .fg { display: flex; flex-direction: column; gap: 5px; }
    .fg label { font-size: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--blue); }
    .fg input, .fg select, .fg textarea {
      background: var(--sky);
      border: 1.5px solid #b8d0ee;
      border-radius: 7px; padding: 11px 14px;
      color: var(--navy); font-size: 14px; font-family: 'Barlow', sans-serif;
      outline: none; transition: border-color 0.2s, background 0.2s;
      -webkit-appearance: none; appearance: none;
    }
    .fg input::placeholder, .fg textarea::placeholder { color: #94afc8; }
    .fg input:focus, .fg select:focus, .fg textarea:focus {
      border-color: var(--gold); background: #fffbf0;
    }
    .fg textarea { min-height: 88px; resize: vertical; }

    .btn-row { display: flex; gap: 12px; margin-top: 4px; }
    .btn-submit {
      flex: 1;
      background: var(--navy); color: var(--white);
      padding: 14px 24px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase;
      cursor: pointer; font-family: 'Barlow', sans-serif;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-submit:hover { background: var(--blue); transform: translateY(-2px); }
    .btn-whatsapp {
      display: flex; align-items: center; gap: 8px;
      background: #e7fbed; border: 1.5px solid #7ed8a0;
      border-radius: 8px; padding: 13px 18px;
      color: #1a7a3f; font-size: 13px; font-weight: 800;
      text-decoration: none; white-space: nowrap;
      transition: background 0.2s;
    }
    .btn-whatsapp:hover { background: #d0f5dd; }
    .wa-icon { font-size: 20px; line-height: 1; }

    footer {
      background: var(--navy); padding: 20px 24px; text-align: center;
    }
    footer p { font-size: 12px; color: rgba(255,255,255,0.4); }
    footer span { color: var(--gold); }

    @media (max-width: 480px) {
      .form-wrap { padding: 28px 20px; }
      .form-row { grid-template-columns: 1fr; }
      .btn-row { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div class="flyer">
    <img src="flyer-1024x1792.png" alt="Treasure Courier Services Ltd – Shop Online. We Deliver." />
  </div>

  <div class="contact">
    <div class="form-wrap">
      <div class="form-heading">Send Us a <span>Message</span></div>
      <form class="cform" name="contact" method="POST" data-netlify="true">
        <input type="hidden" name="form-name" value="contact" />
        <div class="form-row">
          <div class="fg">
            <label>First Name</label>
            <input type="text" name="first_name" placeholder="First name" required />
          </div>
          <div class="fg">
            <label>Last Name</label>
            <input type="text" name="last_name" placeholder="Last name" />
          </div>
        </div>
        <div class="fg">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="fg">
          <label>Phone Number</label>
          <input type="tel" name="phone" placeholder="+1 (876) 000-0000" />
        </div>
        <div class="fg">
          <label>Service Required</label>
          <select name="service">
            <option value="">Select a service…</option>
            <option>Air Freight – Miami to Jamaica</option>
            <option>Sea Cargo – Miami to Jamaica</option>
            <option>Door-to-Door Delivery</option>
            <option>Customs Clearance</option>
            <option>Package Consolidation</option>
            <option>General Inquiry</option>
          </select>
        </div>
        <div class="fg">
          <label>Message</label>
          <textarea name="message" placeholder="Tell us about your shipment — weight, size, contents…"></textarea>
        </div>
        <div class="btn-row">
          <button type="submit" class="btn-submit">Send Message</button>
          <a href="https://wa.me/18768212068" target="_blank" class="btn-whatsapp">
            <span class="wa-icon">💬</span> WhatsApp
          </a>
        </div>
      </form>
    </div>
  </div>

  <footer>
    <p>© 2025 <span>Treasure Courier Services Ltd</span> · All rights reserved · treasurecourier.com</p>
  </footer>

</body>
</html>
